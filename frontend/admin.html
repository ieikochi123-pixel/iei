<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IEI Booking Administration Dashboard</title>

<style>

body{
    font-family: Arial, Helvetica, sans-serif;
    background:#f5f7fa;
    margin:0;
    padding:30px;
    color:#333;
}

.dashboard-container{
    max-width:1300px;
    margin:auto;
}

.dashboard-title{
    text-align:center;
    margin-bottom:30px;
}

.dashboard-title h1{
    color:#0c3c60;
    margin-bottom:10px;
}

.gold-line{
    width:70px;
    height:4px;
    background:#f1b434;
    margin:auto;
}

.top-actions{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:20px;
}

.refresh-btn{
    background:#f1b434;
    color:#0c3c60;
    border:none;
    padding:12px 20px;
    border-radius:6px;
    font-weight:bold;
    cursor:pointer;
}

.stats-card{
    background:white;
    border-top:4px solid #f1b434;
    border-radius:8px;
    padding:20px;
    margin-bottom:20px;
    box-shadow:0 4px 10px rgba(0,0,0,0.05);
}

.stats-number{
    font-size:30px;
    font-weight:bold;
    color:#0c3c60;
}

.table-wrapper{
    background:white;
    border-top:4px solid #f1b434;
    border-radius:8px;
    padding:20px;
    box-shadow:0 4px 10px rgba(0,0,0,0.05);
    overflow-x:auto;
}

table{
    width:100%;
    border-collapse:collapse;
}

th{
    background:#0c3c60;
    color:white;
    padding:14px;
    text-align:left;
}

td{
    padding:12px;
    border-bottom:1px solid #eee;
}

tr:hover{
    background:#f8f8f8;
}

.status{
    padding:6px 12px;
    border-radius:20px;
    font-size:12px;
    font-weight:bold;
}

.pending{
    background:#fff3cd;
    color:#856404;
}

.approved{
    background:#d4edda;
    color:#155724;
}

.rejected{
    background:#f8d7da;
    color:#721c24;
}

.loading,
.no-data{
    text-align:center;
    padding:20px;
    color:#777;
}

.approve-btn{
    background:#137333;
    color:white;
    border:none;
    padding:8px 12px;
    border-radius:5px;
    cursor:pointer;
    margin-right:5px;
    font-weight:bold;
}

.reject-btn{
    background:#c5221f;
    color:white;
    border:none;
    padding:8px 12px;
    border-radius:5px;
    cursor:pointer;
    font-weight:bold;
}
.stats-grid{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:20px;
    margin-bottom:20px;
}

</style>
</head>

<body>
    <script>

if(
    localStorage.getItem("adminLoggedIn")
    !== "true"
){
    window.location.href =
        "admin-login.html";
}

</script>

<div class="dashboard-container">

    <div class="dashboard-title">
        <h1>IEI Booking Administration Dashboard</h1>
        <div class="gold-line"></div>
    </div>

    <div class="top-actions">

    <button
        class="refresh-btn"
        onclick="loadBookings()">
        Refresh Bookings
    </button>

    <button
        class="refresh-btn"
        onclick="logout()">
        Logout
    </button>

</div>

    <div class="stats-grid">

    <div class="stats-card">
        <h3>Total Bookings</h3>
        <div class="stats-number" id="totalBookings">0</div>
    </div>

    <div class="stats-card">
        <h3>Pending</h3>
        <div class="stats-number" id="pendingBookings">0</div>
    </div>

    <div class="stats-card">
        <h3>Approved</h3>
        <div class="stats-number" id="approvedBookings">0</div>
    </div>

    <div class="stats-card">
        <h3>Rejected</h3>
        <div class="stats-number" id="rejectedBookings">0</div>
    </div>

</div>

    <div class="table-wrapper">

        <table>

            <thead>
                <tr>
                    <th>Reference</th>
                    <th>Facility</th>
                    <th>Name</th>
                    <th>Phone</th>
                    <th>Email</th>
                    <th>Booking Date</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
            </thead>

            <tbody id="bookingTable">

                <tr>
                    <td colspan="8" class="loading">
                        Loading bookings...
                    </td>
                </tr>

            </tbody>

        </table>

    </div>

</div>

<script>
    function logout(){

    localStorage.removeItem(
        "adminLoggedIn"
    );

    window.location.href =
        "admin-login.html";
}


async function loadBookings() {

    try {

        const response = await fetch(
            "http://localhost:5000/api/bookings"
        );

        const bookings = await response.json();

        const table = document.getElementById("bookingTable");

        let pendingCount = 0;
        let approvedCount = 0;
        let rejectedCount = 0;

        table.innerHTML = "";

        if (bookings.length === 0) {

            document.getElementById("totalBookings").innerText = 0;
            document.getElementById("pendingBookings").innerText = 0;
            document.getElementById("approvedBookings").innerText = 0;
            document.getElementById("rejectedBookings").innerText = 0;

            table.innerHTML = `
                <tr>
                    <td colspan="8" class="no-data">
                        No bookings found
                    </td>
                </tr>
            `;

            return;
        }

        bookings.forEach(booking => {

            let statusClass = "pending";

            if (
                !booking.status ||
                booking.status.toLowerCase() === "pending"
            ) {
                pendingCount++;
                statusClass = "pending";
            }

            if (
                booking.status &&
                booking.status.toLowerCase() === "approved"
            ) {
                approvedCount++;
                statusClass = "approved";
            }

            if (
                booking.status &&
                booking.status.toLowerCase() === "rejected"
            ) {
                rejectedCount++;
                statusClass = "rejected";
            }

            const bookingDate =
                booking.booking_date ||
                booking.start_date ||
                "-";

            table.innerHTML += `
                <tr>

                    <td>${booking.booking_ref || "-"}</td>

                    <td>${booking.facility || "-"}</td>

                    <td>${booking.name || "-"}</td>

                    <td>${booking.phone || "-"}</td>

                    <td>${booking.email || "-"}</td>

                    <td>${bookingDate}</td>

                    <td>
                        <span class="status ${statusClass}">
                            ${booking.status || "Pending"}
                        </span>
                    </td>

                    <td>

                        <button
                            class="approve-btn"
                            onclick="updateStatus(${booking.id}, 'Approved')">
                            Approve
                        </button>

                        <button
                            class="reject-btn"
                            onclick="updateStatus(${booking.id}, 'Rejected')">
                            Reject
                        </button>

                    </td>

                </tr>
            `;
        });

        document.getElementById("totalBookings").innerText =
            bookings.length;

        document.getElementById("pendingBookings").innerText =
            pendingCount;

        document.getElementById("approvedBookings").innerText =
            approvedCount;

        document.getElementById("rejectedBookings").innerText =
            rejectedCount;

    } catch(error){

        console.error(error);

        document.getElementById("bookingTable").innerHTML = `
            <tr>
                <td colspan="8" class="no-data">
                    Unable to load bookings
                </td>
            </tr>
        `;
    }
}
async function updateStatus(id, status) {

    try {

        const response = await fetch(
            `http://localhost:5000/api/bookings/${id}`,
            {
                method: "PUT",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    status: status
                })
            }
        );

        const result = await response.json();

        if(result.success){

            alert("Booking status updated successfully!");

            loadBookings();

        }else{

            alert(result.message);

        }

    } catch(error){

        console.error(error);

        alert("Unable to update booking status.");

    }
}

loadBookings();

</script>

</body>
</html>
```
