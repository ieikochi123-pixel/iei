<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>IE(I) Kochi | Admin Controller</title>
    <link rel="stylesheet" href="../css/main.css">
    <style>
        :root { --gold: #D4AF37; --navy: #0a192f; --glass: rgba(255,255,255,0.05); }
        body { background: var(--navy); color: white; font-family: sans-serif; padding: 20px; }
        .container { max-width: 700px; margin: auto; }
        .card { background: var(--glass); border: 1px solid #333; padding: 20px; border-radius: 12px; margin-bottom: 25px; }
        input, textarea { width: 100%; padding: 10px; margin: 8px 0; background: #000; color: #fff; border: 1px solid #444; border-radius: 5px; box-sizing: border-box; }
        .btn { width: 100%; background: var(--gold); border: none; padding: 12px; font-weight: bold; cursor: pointer; border-radius: 5px; }
        h3 { color: var(--gold); margin-top: 0; border-bottom: 1px solid #222; padding-bottom: 5px; }
    </style>
</head>
<body>

<script>
    if (sessionStorage.getItem("admin_auth") !== "true") {
        let entry = prompt("Admin Password:");
        if (entry === "iei@2026") { sessionStorage.setItem("admin_auth", "true"); }
        else { window.location.href = "../index.html"; }
    }
</script>

<div class="container">
    <h1 style="text-align:center; color:var(--gold);">IE(I) Admin Portal</h1>

    <div class="card">
        <h3>📢 Add Notice</h3>
        <input type="text" id="n_title" placeholder="Notice Heading (title)">
        <input type="text" id="n_url" placeholder="File Link or Details (file_url)">
        <button class="btn" onclick="submitData('notices', {title: 'n_title', file_url: 'n_url'})">Post Notice</button>
    </div>

    <div class="card">
        <h3>👥 Add Committee Member</h3>
        <input type="text" id="c_name" placeholder="Name">
        <input type="text" id="c_role" placeholder="Designation">
        <input type="text" id="c_img" placeholder="Supabase Photo URL">
        <button class="btn" onclick="submitData('committee', {name: 'c_name', designation: 'c_role', photo_url: 'c_img'})">Add Member</button>
    </div>

    <div class="card">
        <h3>📅 Add Event</h3>
        <input type="text" id="e_title" placeholder="Event Title">
        <input type="text" id="e_venue" placeholder="Venue">
        <input type="date" id="e_date">
        <button class="btn" onclick="submitData('events', {title: 'e_title', venue: 'e_venue', event_date: 'e_date'})">Add Event</button>
    </div>

    <div class="card">
        <h3>🖼️ Add Gallery</h3>
        <input type="text" id="g_url" placeholder="Image URL">
        <input type="text" id="g_cap" placeholder="Caption">
        <button class="btn" onclick="submitData('gallery', {image_url: 'g_url', caption: 'g_cap'})">Add Photo</button>
    </div>
</div>

<script>
    async function submitData(table, fields) {
        const payload = {};
        for (let key in fields) {
            payload[key] = document.getElementById(fields[key]).value;
        }

        try {
            const res = await fetch(`/api/admin/add/${table}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            const data = await res.json();
            if(res.ok) { 
                alert("✅ Success!"); 
                location.reload(); 
            } else { 
                alert("❌ Error: " + data.error); 
            }
        } catch (e) { alert("Server is offline!"); }
    }
</script>
</body>
</html>
