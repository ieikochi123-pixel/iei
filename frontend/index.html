<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IEI Kochi Local Centre</title>
    <link rel="stylesheet" href="css/main.css">
</head>
<body>
    <header class="main-header">
        <img src="assets/images/logo.png" alt="IEI Logo" class="logo-img">
        
        <div class="header-text-container">
            <h1 class="brand-title">The Institution of Engineers (India)</h1>
            <div class="sub-title">Kochi Local Centre</div>
        </div>
    </header>

    <main class="container">
        <section style="grid-column: span 8;">
            <h2 class="section-heading">Latest Notices</h2>
            <div id="notices-container">
                <p>Loading dynamic notices from Supabase...</p>
            </div>

            <h2 class="section-heading" style="margin-top: 40px;">Featured Events</h2>
            <div class="event-card">
                <h3>39th National Convention</h3>
                <p>Theme: AI & Sustainable Engineering | Nov 2026</p>
                <a href="convention/index.html" class="btn-neon-trigger">ENTER PORTAL</a>
            </div>
        </section>

        <aside style="grid-column: span 4; display: flex; flex-direction: column; align-items: flex-end;">
            <a href="https://www.ieindia.org/webui/iei-Memb.aspx" class="btn-membership">
                JOIN NOW / MEMBERSHIP
            </a>
        </aside>
    </main>
</body>
</html>
