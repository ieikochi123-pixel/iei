<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>IEI Admin Login</title>

<style>

body{
    font-family:Arial,sans-serif;
    background:#f5f7fa;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.login-box{
    background:white;
    padding:30px;
    width:350px;
    border-top:4px solid #f1b434;
    border-radius:8px;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

h2{
    text-align:center;
    color:#0c3c60;
}

input{
    width:100%;
    padding:12px;
    margin-bottom:15px;
    border:1px solid #ccc;
    border-radius:4px;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:12px;
    background:#0c3c60;
    color:white;
    border:none;
    border-radius:4px;
    cursor:pointer;
    font-weight:bold;
}

button:hover{
    opacity:0.9;
}

</style>

</head>

<body>

<div class="login-box">

    <h2>IEI Admin Login</h2>

    <input
        type="text"
        id="username"
        placeholder="Username">

    <input
        type="password"
        id="password"
        placeholder="Password">

    <button onclick="login()">
        Login
    </button>

</div>

<script>

function login(){

    const username =
        document.getElementById("username").value;

    const password =
        document.getElementById("password").value;

    if(
        username === "admin" &&
        password === "1234"
    ){

        localStorage.setItem(
            "adminLoggedIn",
            "true"
        );

        window.location.href =
            "admin.html";

    }else{

        alert("Invalid username or password");

    }
}

</script>

</body>
</html>
